<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart - Deep Blue Scuba</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #0284c7; --primary-hover: #0369a1; --bg-main: #f8fafc; --bg-white: #ffffff; --text-dark: #0f172a; --text-mute: #64748b; --border: #e2e8f0; --danger: #ef4444; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-dark); min-height: 100vh; }
    .nav { background: var(--bg-white); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; }
    .nav-brand { font-size: 1.5rem; font-weight: 800; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
    .nav-links { display: flex; gap: 2rem; align-items: center; }
    .nav-link { color: var(--text-mute); text-decoration: none; font-weight: 500; }
    .nav-link:hover { color: var(--primary); }
    .btn { background: var(--primary); color: white; border: none; padding: 0.75rem 1.5rem; font-size: 0.95rem; font-weight: 600; border-radius: 0.5rem; cursor: pointer; transition: 0.2s; text-decoration: none; }
    .btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
    
    .container { max-width: 800px; margin: 3rem auto; padding: 0 2rem; }
    h1 { font-size: 2rem; margin-bottom: 2rem; }
    
    .cart-box { background: var(--bg-white); border: 1px solid var(--border); border-radius: 1rem; padding: 2rem; }
    .cart-empty { text-align: center; padding: 3rem 0; color: var(--text-mute); }
    .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid var(--border); }
    .cart-item:last-child { border-bottom: none; }
    .item-name { font-weight: 600; font-size: 1.1rem; }
    .item-qty { color: var(--text-mute); font-size: 0.9rem; }
    .item-price { font-weight: 700; color: var(--primary); }
    
    .cart-total { margin-top: 2rem; display: flex; justify-content: space-between; align-items: center; font-size: 1.25rem; font-weight: 800; padding-top: 1rem; border-top: 2px dashed var(--border); }
    
    .checkout-btn { width: 100%; display: block; text-align: center; margin-top: 2rem; padding: 1rem; font-size: 1.1rem; }
    
    @media (max-width: 768px) {
      .nav { flex-direction: column; padding: 1rem; gap: 1rem; text-align: center; }
      .nav-links { flex-wrap: wrap; justify-content: center; gap: 1rem; }
      .container { padding: 0 1rem; margin: 2rem auto; }
      h1 { font-size: 1.75rem; text-align: center; }
      .cart-box { padding: 1.5rem; }
    }
    
    .footer { background: var(--text-dark); color: white; padding: 4rem 2rem; text-align: center; margin-top: 6rem; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/demo/" class="nav-brand">🌊 Deep Blue</a>
    <div class="nav-links">
      <a href="/demo/" class="nav-link">Home</a>
      <a href="/demo/gear/" class="nav-link">Shop Gear</a>
      <a href="/demo/cart/" class="btn">Cart (<span id="cart-count">0</span>)</a>
    </div>
  </nav>

  <div class="container">
    <h1>Shopping Cart</h1>
    <div class="cart-box">
      <div id="cart-items">
        <div class="cart-empty">Loading cart...</div>
      </div>
      <div class="cart-total" id="cart-total-wrap" style="display: none;">
        <span>Total:</span>
        <span id="cart-total-price">$0</span>
      </div>
      <a href="/demo/checkout/" class="btn checkout-btn" id="checkout-btn" style="display: none;">Proceed to Checkout</a>
    </div>
  </div>

  <footer class="footer">
    <h2>Deep Blue Scuba Hub</h2>
    <p style="margin-top: 1rem; color: #cbd5e1;">Your premier destination for diving gear and certification since 2015.</p>
    <p style="margin-top: 2rem; color: #64748b; font-size: 0.875rem;">© 2026 Deep Blue Scuba. All rights reserved. (Demo Environment)</p>
  </footer>

  <script>
    function renderCart() {
      const cart = JSON.parse(localStorage.getItem('scuba_cart') || '[]');
      const container = document.getElementById('cart-items');
      const totalWrap = document.getElementById('cart-total-wrap');
      const checkoutBtn = document.getElementById('checkout-btn');
      
      const count = cart.reduce((acc, item) => acc + item.quantity, 0);
      document.getElementById('cart-count').innerText = count;
      
      if(cart.length === 0) {
        container.innerHTML = '<div class="cart-empty">Your cart is completely empty. <br><br><a href="/demo/gear/" style="color:#0284c7;">Go shopping</a></div>';
        totalWrap.style.display = 'none';
        checkoutBtn.style.display = 'none';
        return;
      }
      
      let html = '';
      let total = 0;
      cart.forEach(item => {
        const itemTotal = item.price * item.quantity;
        total += itemTotal;
        html += `
          <div class="cart-item">
            <div>
              <div class="item-name">${item.name}</div>
              <div class="item-qty">Qty: ${item.quantity} x $${item.price}</div>
            </div>
            <div class="item-price">$${itemTotal}</div>
          </div>
        `;
      });
      container.innerHTML = html;
      document.getElementById('cart-total-price').innerText = '$' + total;
      totalWrap.style.display = 'flex';
      checkoutBtn.style.display = 'block';
    }
    document.addEventListener('DOMContentLoaded', renderCart);
  </script>

  <script type="module">
    import { initializeTracker } from '/sdk/index.js';
    initializeTracker({ endpoint: window.location.origin + '/api/events/batch', autoTrackPageViews: true, autoTrackClicks: true });
  </script>
</body>
</html>
