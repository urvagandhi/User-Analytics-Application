<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Deep Blue Scuba</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #0284c7; --primary-hover: #0369a1; --bg-main: #f8fafc; --bg-white: #ffffff; --text-dark: #0f172a; --text-mute: #64748b; --border: #e2e8f0; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-dark); min-height: 100vh; }
    .nav { background: var(--bg-white); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; }
    .nav-brand { font-size: 1.5rem; font-weight: 800; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
    
    .container { max-width: 600px; margin: 3rem auto; padding: 0 2rem; }
    h1 { font-size: 2rem; margin-bottom: 2rem; text-align: center; }
    
    .checkout-form { background: var(--bg-white); border: 1px solid var(--border); border-radius: 1rem; padding: 2.5rem; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; }
    .form-group input { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; font-family: inherit; font-size: 1rem; }
    .form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.1); }
    
    .btn { background: var(--primary); color: white; border: none; padding: 1rem; font-size: 1rem; font-weight: 700; border-radius: 0.5rem; cursor: pointer; width: 100%; transition: 0.2s; margin-top: 1rem; }
    .btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
    
    .btn-broken { background: #cbd5e1; color: #475569; cursor: not-allowed; margin-top: 1rem; }
    .btn-broken:hover { transform: none; background: #cbd5e1; }
    
    @media (max-width: 768px) {
      .nav { padding: 1rem; }
      .container { padding: 0 1rem; margin: 2rem auto; }
      h1 { font-size: 1.75rem; }
      .checkout-form { padding: 1.5rem; }
    }
    
    .footer { background: var(--text-dark); color: white; padding: 4rem 2rem; text-align: center; margin-top: 6rem; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/demo/" class="nav-brand">🌊 Deep Blue</a>
    <a href="/demo/cart/" style="color: var(--text-mute); text-decoration: none; font-weight: 500;">&larr; Back to Cart</a>
  </nav>

  <div class="container">
    <h1>Secure Checkout</h1>
    <div class="checkout-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" placeholder="Jacques Cousteau">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="explorer@ocean.com">
      </div>
      <div class="form-group">
        <label>Credit Card</label>
        <input type="text" placeholder="0000 0000 0000 0000">
      </div>
      
      <button class="btn btn-broken" id="broken-coupon">Apply Discount Code</button>
      <button class="btn" id="pay-btn">Pay $<span id="pay-amount">0</span></button>
    </div>
  </div>

  <footer class="footer">
    <h2>Deep Blue Scuba Hub</h2>
    <p style="margin-top: 1rem; color: #cbd5e1;">Your premier destination for diving gear and certification since 2015.</p>
    <p style="margin-top: 2rem; color: #64748b; font-size: 0.875rem;">© 2026 Deep Blue Scuba. All rights reserved. (Demo Environment)</p>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const cart = JSON.parse(localStorage.getItem('scuba_cart') || '[]');
      const total = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);
      document.getElementById('pay-amount').innerText = total;
      
      document.getElementById('broken-coupon').addEventListener('click', (e) => {
        e.preventDefault();
        // Broken button to generate dead/rage clicks
      });
      
      document.getElementById('pay-btn').addEventListener('click', (e) => {
        e.preventDefault();
        alert('Payment successful! Thank you for your purchase.');
        localStorage.removeItem('scuba_cart');
        window.location.href = '/demo/';
      });
    });
  </script>

  <script type="module">
    import { initializeTracker } from '/sdk/index.js';
    initializeTracker({ endpoint: window.location.origin + '/api/events/batch', autoTrackPageViews: true, autoTrackClicks: true });
  </script>
</body>
</html>
