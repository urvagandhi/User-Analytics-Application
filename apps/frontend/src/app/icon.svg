<svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7a501" />
      <stop offset="100%" stop-color="#dd9001" />
    </linearGradient>
    <linearGradient id="gradBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c84e0" />
      <stop offset="100%" stop-color="#1078a3" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Funnel Shape -->
  <path d="M12 25 C35 15, 65 15, 88 25 L65 60 L65 85 C55 92, 45 92, 35 85 L35 60 Z" fill="url(#grad)" filter="url(#glow)" />
  
  <!-- Inner Depth -->
  <path d="M12 25 C35 35, 65 35, 88 25 C65 15, 35 15, 12 25 Z" fill="#b17816" opacity="0.6" />
  
  <!-- Causal Nodes -->
  <circle cx="25" cy="25" r="8" fill="url(#gradBlue)" stroke="#ffffff" stroke-width="2" />
  <circle cx="75" cy="25" r="8" fill="url(#gradBlue)" stroke="#ffffff" stroke-width="2" />
  <circle cx="50" cy="55" r="10" fill="#ffffff" stroke="url(#gradBlue)" stroke-width="4" />
  <circle cx="50" cy="82" r="6" fill="url(#gradBlue)" stroke="#ffffff" stroke-width="2" />
  
  <!-- Data Flow Lines -->
  <path d="M30 30 L43 48" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.9" />
  <path d="M70 30 L57 48" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.9" />
  <path d="M50 65 L50 76" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.9" />
</svg>
